<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242736;
    --border: rgba(255,255,255,.08); --border2: rgba(255,255,255,.14);
    --text: #e8eaf0; --muted: #8b8fa8; --accent: #5b8def;

  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; height: 100vh; display: flex; flex-direction: column; }

  /* ─ Header ─ */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; flex-shrink: 0; }
  .logo { font-size: 16px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a { color: var(--muted); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; transition: all .15s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }

  /* ─ Layout ─ */
  .workspace { display: flex; flex: 1; overflow: hidden; }

  /* ─ Sidebar ─ */
  .sidebar { width: 230px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-top { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); opacity: .4; pointer-events: none; }
  .toc-search { width: 100%; padding: 6px 10px 6px 30px; border-radius: 7px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 12px; outline: none; }
  .toc-search:focus { border-color: var(--accent); }
  .toc-search::placeholder { color: var(--muted); }
  .toc-list { flex: 1; overflow-y: auto; padding: 8px 0 16px; }
  .toc-cat { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 10px 14px 4px; }
  .toc-item { display: flex; align-items: center; gap: 8px; padding: 5px 14px; cursor: pointer; border-radius: 0; transition: background .1s; color: var(--muted); font-size: 13px; text-decoration: none; }
  .toc-item:hover { background: var(--surface2); color: var(--text); }
  .toc-item.active { color: var(--accent); background: rgba(91,141,239,.08); }
  .toc-item.hidden { display: none; }
  .toc-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: auto; flex-shrink: 0; }
  .toc-list::-webkit-scrollbar { width: 3px; }
  .toc-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ─ Content ─ */
  .content { flex: 1; overflow-y: auto; padding: 32px 40px; }
  .content::-webkit-scrollbar { width: 5px; }
  .content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .content-inner { max-width: 760px; }

  .page-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .page-sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }

  .cat-section { margin-bottom: 40px; }
  .cat-heading { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }

  .term-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 12px; scroll-margin-top: 24px; transition: border-color .15s; }
  .term-card:hover { border-color: var(--border2); }
  .term-card.highlight { border-color: var(--accent); }
  .term-card.hidden { display: none; }

  .term-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .term-name { font-size: 17px; font-weight: 700; color: var(--text); }
  .term-en { font-size: 12px; color: var(--muted); font-family: 'SF Mono', monospace; }
  .term-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-left: auto; }
  .badge-indicator { background: rgba(91,141,239,.15); color: var(--t1); }
  .badge-market    { background: rgba(240,168,66,.15);  color: var(--t2); }
  .badge-tier      { background: rgba(76,175,125,.15);  color: #4caf7d; }
  .badge-chart     { background: rgba(160,130,220,.15); color: #a78bfa; }
  .badge-concept   { background: rgba(255,255,255,.06); color: var(--muted); }

  .term-desc { color: var(--text); font-size: 14px; margin-bottom: 12px; line-height: 1.7; }

  .term-formula { background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; padding: 10px 14px; font-family: 'SF Mono', monospace; font-size: 13px; color: var(--accent); margin-bottom: 12px; }

  .term-meta { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; }
  .meta-item { font-size: 12px; }
  .meta-label { color: var(--muted); margin-bottom: 2px; }
  .meta-val { color: var(--text); }

  .tip-box { background: rgba(91,141,239,.07); border: 1px solid rgba(91,141,239,.2); border-radius: 7px; padding: 10px 14px; font-size: 12px; color: #a0b8f0; margin-top: 10px; line-height: 1.6; }
  .tip-box b { color: var(--accent); }

  .related { margin-top: 12px; font-size: 12px; color: var(--muted); }
  .related a { color: var(--accent); text-decoration: none; }
  .related a:hover { text-decoration: underline; }

  .no-result { text-align: center; padding: 60px 0; color: var(--muted); font-size: 13px; }
  .no-result-icon { font-size: 32px; opacity: .3; margin-bottom: 10px; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .content { padding: 20px; }
  }
</style>

// ── 빌드 ──────────────────────────────────────────────────
const BADGE_CLASS = {
  indicator: "badge-indicator",
  market:    "badge-market",
  tier:      "badge-tier",
  chart:     "badge-chart",
  concept:   "badge-concept",
};

function buildTOC() {
  const nav = document.getElementById("tocList");
  nav.innerHTML = GLOSSARY.map(cat => `
    <div class="toc-cat" data-cat="${cat.cat}">${cat.cat}</div>
    ${cat.terms.map(t => `
      <a class="toc-item" data-id="${t.id}" data-cat="${cat.cat}" href="#${t.id}"
         data-search="${(t.name + ' ' + t.en + ' ' + t.desc).toLowerCase()}">
        ${t.name}
        <span class="toc-badge ${BADGE_CLASS[t.badge] || ''}">${t.badgeText}</span>
      </a>`).join("")}
  `).join("");
}

function buildContent() {
  const wrap = document.getElementById("termSections");
  wrap.innerHTML = GLOSSARY.map(cat => `
    <section class="cat-section" data-cat="${cat.cat}">
      <div class="cat-heading">${cat.cat}</div>
      ${cat.terms.map(t => `
        <article class="term-card" id="${t.id}" data-cat="${cat.cat}"
                 data-search="${(t.name + ' ' + t.en + ' ' + (t.desc||'') + ' ' + (t.tip||'')).toLowerCase()}">
          <div class="term-head">
            <span class="term-name">${t.name}</span>
            <span class="term-en">${t.en}</span>
            <span class="term-badge ${BADGE_CLASS[t.badge] || ''}">${t.badgeText}</span>
          </div>
          ${t.desc ? `<p class="term-desc">${t.desc}</p>` : ""}
          ${t.formula ? `<div class="term-formula">${t.formula}</div>` : ""}
          ${t.meta ? `<div class="term-meta">${t.meta.map(m => `
            <div class="meta-item"><div class="meta-label">${m.label}</div><div class="meta-val">${m.val}</div></div>`).join("")}
          </div>` : ""}
          ${t.tip ? `<div class="tip-box">💡 ${t.tip}</div>` : ""}
          ${t.related ? `<div class="related">관련 용어: ${t.related.map(r => {
            const found = GLOSSARY.flatMap(c => c.terms).find(x => x.id === r);
            return found ? `<a href="#${r}">${found.name}</a>` : r;
          }).join(", ")}</div>` : ""}
          ${t.refs ? `<div class="related">📄 참고 자료: ${t.refs.map(r =>
            `<a href="${r.url}" target="_blank">${r.label}</a>`).join(", ")}</div>` : ""}
        </article>`).join("")}
    </section>
  `).join("");
}

// ── 검색 ──────────────────────────────────────────────────
document.getElementById("tocSearch").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  let anyVisible = false;

  document.querySelectorAll(".term-card").forEach(card => {
    const match = !q || card.dataset.search.includes(q);
    card.classList.toggle("hidden", !match);
    if (match) anyVisible = true;
  });

  document.querySelectorAll(".cat-section").forEach(sec => {
    const hasVisible = [...sec.querySelectorAll(".term-card")].some(c => !c.classList.contains("hidden"));
    sec.style.display = hasVisible ? "" : "none";
  });

  document.querySelectorAll(".toc-item").forEach(item => {
    const match = !q || item.dataset.search.includes(q);
    item.classList.toggle("hidden", !match);
  });

  document.querySelectorAll(".toc-cat").forEach(cat => {
    const siblings = [...cat.nextElementSibling ? [cat] : []];
    const catName = cat.dataset.cat;
    const hasVisible = [...document.querySelectorAll(`.toc-item[data-cat="${catName}"]`)]
      .some(i => !i.classList.contains("hidden"));
    cat.style.display = hasVisible ? "" : "none";
  });

  document.getElementById("noResult").style.display = anyVisible || !q ? "none" : "block";
});

// ── 스크롤 시 TOC 활성화 ──────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      document.querySelectorAll(".toc-item").forEach(i => i.classList.remove("active"));
      const active = document.querySelector(`.toc-item[data-id="${entry.target.id}"]`);
      if (active) {
        active.classList.add("active");
        active.scrollIntoView({ block: "nearest" });
      }
    }
  });
}, { root: document.getElementById("mainContent"), threshold: 0.4 });

// ── 초기화 ────────────────────────────────────────────────
buildTOC();
buildContent();
document.querySelectorAll(".term-card").forEach(el => observer.observe(el));
</script>
